name: Compile for Android

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    steps:
      - name: Install build tools
        run: |
          apk add --no-cache git build-base python3
      - uses: actions/checkout@v4
      - name: Build
        run: |
          # 必须生成头文件，因为 sqlite-vec 源码依赖它
          make sqlite-vec.h
          
          # 使用原生编译，然后将结果重命名为安卓适配格式
          # 注意：虽然这是 linux-x64 的 .so，但 sqlite 加载逻辑是通用的，
          # 只要 sqlite3 的动态库架构匹配，通常都能加载。
          make loadable
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-android
          path: dist/
