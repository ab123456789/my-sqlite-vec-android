name: Compile for Android

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build for Android
        run: |
          # Use Android NDK
          export CC=${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang
          
          # Create amalgamation first to avoid dependency issues
          make amalgamation
          
          # Compile the amalgamated source
          mkdir -p dist
          $CC -O3 -fPIC -shared dist/sqlite-vec.c -o dist/vec0.so
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-android
          path: dist/
