name: Compile for Android

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build for Android
        run: |
          # Create a minimal CMakeLists.txt to build the library
          echo "cmake_minimum_required(VERSION 3.10)
          project(sqlite-vec)
          add_library(vec0 SHARED sqlite-vec.c)
          target_include_directories(vec0 PRIVATE \${CMAKE_CURRENT_SOURCE_DIR})" > CMakeLists.txt
          
          # Build using standard cmake with Android toolchain
          mkdir build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_LATEST_HOME}/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-33 \
                ..
          make
          
          # Move to dist
          mkdir ../dist && cp libvec0.so ../dist/vec0.so
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-android
          path: dist/
